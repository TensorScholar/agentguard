name: AgentGuard

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  mcp-security-gate:
    name: MCP security gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install AgentGuard
        run: python -m pip install -e .

      - name: Run changed-config gate
        shell: bash
        run: |
          set +e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="${{ github.event.before }}"
          fi

          if [[ "$BASE_REF" =~ ^0+$ ]]; then
            python -m agentguard.cli scan \
              --format findings-json \
              --output agentguard-findings.json \
              --summary-output agentguard-summary.md
            STATUS=$?
          else
            python -m agentguard.cli gate \
              --changed-from "$BASE_REF" \
              --fail-on-risk high \
              --format findings-json \
              --output agentguard-findings.json \
              --summary-output agentguard-summary.md
            STATUS=$?
          fi

          if [ -n "${GITHUB_STEP_SUMMARY:-}" ] && [ -f agentguard-summary.md ]; then
            cat agentguard-summary.md >> "$GITHUB_STEP_SUMMARY"
          fi

          exit "$STATUS"

      - name: Upload AgentGuard report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: agentguard-scan
          path: |
            agentguard-findings.json
            agentguard-summary.md
