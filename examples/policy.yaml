default_action: allow
redact_secret_outputs: true

denied_tools:
  - delete_file
  - run_shell

blocked_path_patterns:
  - ".env"
  - "**/.env"
  - ".ssh/**"
  - "**/id_rsa"
  - ".aws/**"
  - ".npmrc"

blocked_env_names:
  - GITHUB_TOKEN
  - OPENAI_API_KEY
  - AWS_SECRET_ACCESS_KEY

blocked_network_hosts:
  - 169.254.169.254
  - metadata.google.internal

denied_capabilities:
  - credential_access

require_approval_capabilities:
  - shell_execution
  - production_mutation
